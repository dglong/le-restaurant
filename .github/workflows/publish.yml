name: Publish

# Publishes to npm on a version tag (e.g. v1.2.3) using npm Trusted Publishing
# (OIDC) — no stored registry token. The package's trusted publisher must be
# configured on npmjs.com to point at this repo + workflow filename (publish.yml).
# Provenance is generated automatically under OIDC, so no --provenance flag.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing (and provenance)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm to a version that supports trusted publishing
        run: npm install -g npm@latest # trusted publishing needs npm >= 11.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Source-skill sync check
        run: npm run check:sync

      - name: Test
        run: npm test

      - name: Publish to npm (trusted publishing / OIDC)
        run: |
          echo "npm version: $(npm --version)"
          echo "--- userconfig .npmrc ---"
          cat "$NPM_CONFIG_USERCONFIG" 2>/dev/null || echo "(none)"
          npm publish --access public --loglevel verbose || status=$?
          echo "=== oidc / auth lines from debug log ==="
          grep -iE "oidc|id-token|trusted|provenance|authToken|need auth|forbidden|404" ~/.npm/_logs/*-debug-0.log | tail -60 || true
          exit ${status:-0}
